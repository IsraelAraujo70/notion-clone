services:
  api:
    build:
      context: ./backend
      target: dev
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notion_clone
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3100,http://127.0.0.1:3100,http://web-e2e:3000
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Notion Clone <noreply@israeldeveloper.com.br>}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-openai/gpt-5.6-luna}
      AI_TITLE_MODEL: ${AI_TITLE_MODEL:-deepseek/deepseek-v4-flash}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-openai/text-embedding-3-large}
      # Mesmo padrão do drive-clone: public endpoint = host que o browser alcança.
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET: media
      S3_REGION: us-east-1
      S3_URL_STYLE: path
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_PUBLIC_BASE_URL: http://localhost:9000/media
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
    volumes:
      - api_target:/app/target
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/src
          initial_sync: true
        - action: sync+restart
          path: ./backend/migrations
          target: /app/migrations
          initial_sync: true
        - action: rebuild
          path: ./backend/Cargo.toml
        - action: rebuild
          path: ./backend/Cargo.lock

  worker:
    build:
      context: ./backend
      target: dev
    command: cargo run --bin notion-clone-worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notion_clone
      WORKER_INTERVAL_SECONDS: 1
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-openai/gpt-5.6-luna}
      AI_TITLE_MODEL: ${AI_TITLE_MODEL:-deepseek/deepseek-v4-flash}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-openai/text-embedding-3-large}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET: media
      S3_REGION: us-east-1
      S3_URL_STYLE: path
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_PUBLIC_BASE_URL: http://localhost:9000/media
    depends_on:
      postgres:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
    volumes:
      - worker_target:/app/target

  # Local dev uses `make dev` → `npm run dev` on the host.
  # Keep this service only for optional containerized Next (profile docker-web).
  web:
    profiles: ["docker-web"]
    build:
      context: ./frontend
      target: dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:18080
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          initial_sync: true
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json

  api-e2e:
    profiles: ["e2e"]
    build:
      context: ./backend
      target: dev
    command: cargo run --bin notion-clone-api
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notion_clone
      CORS_ALLOWED_ORIGINS: http://web-e2e:3000
      PUBLIC_WEB_URL: http://web-e2e:3000
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Notion Clone <noreply@israeldeveloper.com.br>}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-openai/gpt-5.6-luna}
      AI_TITLE_MODEL: ${AI_TITLE_MODEL:-deepseek/deepseek-v4-flash}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-openai/text-embedding-3-large}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: media
      S3_REGION: us-east-1
      S3_URL_STYLE: path
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_PUBLIC_BASE_URL: http://minio:9000/media
    depends_on:
      postgres:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
    volumes:
      - api_e2e_target:/app/target

  worker-e2e:
    profiles: ["e2e"]
    build:
      context: ./backend
      target: dev
    command: cargo run --bin notion-clone-worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notion_clone
      WORKER_INTERVAL_SECONDS: 1
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-openai/gpt-5.6-luna}
      AI_TITLE_MODEL: ${AI_TITLE_MODEL:-deepseek/deepseek-v4-flash}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-openai/text-embedding-3-large}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: media
      S3_REGION: us-east-1
      S3_URL_STYLE: path
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_PUBLIC_BASE_URL: http://minio:9000/media
    depends_on:
      postgres:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
    volumes:
      - worker_e2e_target:/app/target

  web-e2e:
    profiles: ["e2e"]
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api-e2e:8080
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      - api-e2e

  cypress:
    profiles: ["e2e"]
    image: cypress/included:15.18.0
    working_dir: /e2e
    entrypoint: ["sh", "-lc"]
    command: ["npm ci && npx cypress run"]
    environment:
      CYPRESS_baseUrl: http://web-e2e:3000
      CYPRESS_apiBaseUrl: http://api-e2e:8080
    depends_on:
      - web-e2e
    volumes:
      - ./frontend:/e2e
      - cypress_node_modules:/e2e/node_modules

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notion_clone
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000,http://127.0.0.1:3000,http://web-e2e:3000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -e
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        /usr/bin/mc mb --ignore-existing local/media
        /usr/bin/mc anonymous set download local/media

volumes:
  api_target:
  worker_target:
  api_e2e_target:
  worker_e2e_target:
  cypress_node_modules:
  postgres_data:
  minio_data:
