services:
  api:
    build:
      context: ./backend
      target: dev
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notion_clone
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://web-e2e:3000
      PUBLIC_WEB_URL: http://localhost:3000
      RESEND_FROM_EMAIL: Notion Clone <onboarding@resend.dev>
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - api_target:/app/target
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/src
          initial_sync: true
        - action: sync+restart
          path: ./backend/migrations
          target: /app/migrations
          initial_sync: true
        - action: rebuild
          path: ./backend/Cargo.toml
        - action: rebuild
          path: ./backend/Cargo.lock

  web:
    build:
      context: ./frontend
      target: dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:18080
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          initial_sync: true
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json

  api-e2e:
    profiles: ["e2e"]
    build:
      context: ./backend
      target: dev
    command: cargo run --bin notion-clone-api
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notion_clone
      CORS_ALLOWED_ORIGINS: http://web-e2e:3000
      PUBLIC_WEB_URL: http://web-e2e:3000
      RESEND_FROM_EMAIL: Notion Clone <onboarding@resend.dev>
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - api_e2e_target:/app/target

  web-e2e:
    profiles: ["e2e"]
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api-e2e:8080
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      - api-e2e

  cypress:
    profiles: ["e2e"]
    image: cypress/included:15.18.0
    working_dir: /e2e
    entrypoint: ["sh", "-lc"]
    command: ["npm ci && npx cypress run"]
    environment:
      CYPRESS_baseUrl: http://web-e2e:3000
      CYPRESS_apiBaseUrl: http://api-e2e:8080
    depends_on:
      - web-e2e
    volumes:
      - ./frontend:/e2e
      - cypress_node_modules:/e2e/node_modules

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notion_clone
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  api_target:
  api_e2e_target:
  cypress_node_modules:
  postgres_data:
