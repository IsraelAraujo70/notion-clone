# ponytail: stack mínima para M2+ (M1 roda 100% no browser via `make dev`).
services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: notion
      POSTGRES_PASSWORD: notion
      POSTGRES_DB: notion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notion"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgres://notion:notion@db:5432/notion
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
